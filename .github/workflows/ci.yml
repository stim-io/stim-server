name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Attach stim-proto sibling
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git clone --depth 1 https://x-access-token:${GITHUB_TOKEN}@github.com/stim-io/stim-proto.git ../stim-proto

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify cold-start baseline files exist
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f .gitignore

      - name: Verify stim-proto consumer proof
        run: cargo test
